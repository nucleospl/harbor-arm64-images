name: Build Harbor ARM64 Images

# Buduje kompletny zestaw obrazów Harbor dla linux/arm64.
# Używa natywnego runnera arm64 — bez QEMU, bez emulacji.
# Kod upstream klonowany po pinowanym commit SHA (odporność na tag-tampering).
# Obrazy skanowane Trivym, pushowane do GHCR i podpisywane cosign (keyless OIDC).

on:
  workflow_dispatch:
    inputs:
      harbor_version:
        description: 'Harbor version tag (np. v2.12.0)'
        required: true
        type: string
      harbor_sha:
        description: 'Commit SHA upstream (pinned, nie tag)'
        required: true
        type: string

permissions:
  contents: write   # zapis versions.json
  packages: write   # push do GHCR
  id-token: write   # cosign keyless (OIDC)

env:
  GHCR_REGISTRY:    ghcr.io
  IMAGE_NAMESPACE:  nucleospl/harbor-arm64-images
  HARBOR_VERSION:   ${{ inputs.harbor_version }}
  HARBOR_SHA:       ${{ inputs.harbor_sha }}

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-24.04-arm   # natywny arm64 — binaria i obrazy natywne, bez QEMU
    timeout-minutes: 120

    steps:
      # ── 1. Ten repo ─────────────────────────────────────────────────────────
      - name: Checkout harbor-arm64-images
        uses: actions/checkout@v4

      # ── 2. Logowanie do GHCR ─────────────────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Klonowanie Harbor UPSTREAM po pinowanym SHA ────────────────────
      #    NIE używamy --depth 1 żeby checkout konkretnego SHA był niezawodny.
      - name: Clone goharbor/harbor at pinned SHA
        run: |
          git clone https://github.com/goharbor/harbor.git harbor-src
          cd harbor-src
          git checkout "${{ env.HARBOR_SHA }}"

          # Weryfikacja integralności — SHA musi się zgadzać
          ACTUAL=$(git rev-parse HEAD)
          if [ "$ACTUAL" != "${{ env.HARBOR_SHA }}" ]; then
            echo "::error::SHA mismatch! expected=${{ env.HARBOR_SHA }} actual=$ACTUAL"
            exit 1
          fi
          echo "Upstream verified at SHA: $ACTUAL"

      # ── 4. Kompilacja binarek Go (wewnątrz kontenera golang na arm64) ─────
      #    make compile uruchamia `docker run golang:X go build ...`
      #    Na arm64 runnerze Docker domyślnie używa obrazów arm64 → arm64 binarki.
      - name: Compile Harbor Go binaries
        working-directory: harbor-src
        run: make compile

      # ── 5. Budowanie obrazów Docker ───────────────────────────────────────
      #    Harbor Makefile używa REGISTRYSERVER jako ścieżki do Dockerfile (nie adresu registry!).
      #    Budujemy z domyślną nazwą goharbor/... a potem re-tagujemy do GHCR.
      #    PULL_BASE_FROM_DOCKERHUB=false → buduje photon base images lokalnie
      #    (DockerHub nie ma arm64 Harbor base images).
      - name: Build Harbor Docker images
        working-directory: harbor-src
        # Jawnie ustawiamy Harbor-internal vars żeby żadna zmienna środowiskowa
        # (np. REGISTRY, REGISTRYSERVER) nie wyciekła z naszego workflow do Makefile.
        run: |
          make build \
            IMAGENAMESPACE=goharbor \
            REGISTRYSERVER=goharbor \
            VERSIONTAG="${{ env.HARBOR_VERSION }}" \
            BASEIMAGETAG="${{ env.HARBOR_VERSION }}" \
            PULL_BASE_FROM_DOCKERHUB=false \
            PUSHBASEIMAGE=false

      - name: Re-tag images to GHCR namespace
        run: |
          NS="${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}"
          VER="${{ env.HARBOR_VERSION }}"
          # Wykryj obrazy runtime: mają tag wersji i nie są pośrednimi base images
          BUILT=$(docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep "^goharbor/.*:${VER}$" \
            | grep -v "\-base:" \
            | sed "s|goharbor/||;s|:${VER}\$||" \
            | sort -u)
          echo "Built images: ${BUILT}"
          for img in $BUILT; do
            docker tag "goharbor/${img}:${VER}" "${NS}/${img}:${VER}"
            echo "Tagged: goharbor/${img}:${VER} → ${NS}/${img}:${VER}"
          done
          # Zapisz listę dla kolejnych kroków
          echo "$BUILT" > /tmp/built_images.txt

      # ── 6. Skanowanie Trivy (przed pushem, lokalny obraz) ────────────────
      #    CRITICAL → fail buildu. HIGH → tylko raport (nie blokuje).
      - name: Trivy scan — harbor-core (reprezentatywny, blokujący)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'goharbor/harbor-core:${{ env.HARBOR_VERSION }}'
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Trivy scan — wszystkie obrazy (HIGH, tylko raport)
        continue-on-error: true
        run: |
          VER="${{ env.HARBOR_VERSION }}"
          for img in $(cat /tmp/built_images.txt); do
            echo "=== Scanning ${img} ==="
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image \
              --severity HIGH \
              --ignore-unfixed \
              --no-progress \
              "goharbor/${img}:${VER}" || true
          done

      # ── 7. Push do GHCR ───────────────────────────────────────────────────
      - name: Push all images to GHCR
        run: |
          NS="${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}"
          VER="${{ env.HARBOR_VERSION }}"

          for img in $(cat /tmp/built_images.txt); do
            echo "Pushing ${NS}/${img}:${VER}"
            docker push "${NS}/${img}:${VER}"
            docker tag  "${NS}/${img}:${VER}" "${NS}/${img}:latest"
            docker push "${NS}/${img}:latest"
          done

      # ── 8. Podpisywanie cosign (keyless OIDC) ─────────────────────────────
      #    Brak kluczy do zarządzania — podpis weryfikowalny przez Rekor transparency log.
      #    Podpisujemy digest (nie tag) — odporne na tag mutation.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images with cosign keyless
        run: |
          NS="${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}"
          VER="${{ env.HARBOR_VERSION }}"

          for img in $(cat /tmp/built_images.txt); do
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${NS}/${img}:${VER}")
            echo "Signing ${DIGEST}"
            cosign sign --yes "${DIGEST}"
          done

      # ── 9. Aktualizacja versions.json ─────────────────────────────────────
      - name: Update versions.json
        run: |
          cat > versions.json <<EOF
          {
            "last_built":     "${{ env.HARBOR_VERSION }}",
            "last_built_sha": "${{ env.HARBOR_SHA }}",
            "built_at":       "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "registry":       "${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}",
            "images": $(cat /tmp/built_images.txt | jq -R . | jq -sc .)
          }
          EOF

      - name: Commit & push versions.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet \
            || git commit -m "chore: built Harbor ${{ env.HARBOR_VERSION }} arm64 [skip ci]"
          git push
